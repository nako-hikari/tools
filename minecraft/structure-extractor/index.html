<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MCPE Structure Extractor</title>
    <link rel="stylesheet" href="css/nako.css">
</head>
<body>

<div class="wrapper">
    <div class="card">
        <h1>MCPE Structure Extractor</h1>
        <p>Drop a <code>.mcworld</code> or <code>.zip</code> file below. This tool scans the LevelDB binary data directly in your browser to extract saved structures, bypassing the broken mobile export button.</p>
        
        <div style="margin: 20px 0;">
            <input type="file" id="upload" accept=".mcworld,.zip" style="display:none;">
            <button class="primary interactive" onclick="document.getElementById('upload').click()">Select World File</button>
        </div>

        <div id="status" class="output-box" style="display:none;"></div>
    </div>

    <div id="results" class="overflow-auto" style="margin-top: 20px;"></div>

    <div class="footer">
        <div class="footer-title">By Nako Hikari</div>
        <div class="footer-links">
            <a href="https://github.com/nako-hikari/" target="_blank" class="social">
                <img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/github.svg" alt="GitHub">
                GitHub
            </a>
            <a href="https://m.youtube.com/@NaCryst" target="_blank" class="social">
                <img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/youtube.svg" alt="YouTube">
                YouTube
            </a>
            <a href="https://www.tiktok.com/@nako_hikari_mc" target="_blank" class="social">
                <img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/tiktok.svg" alt="TikTok">
                TikTok
            </a>
            <a href="https://ko-fi.com/arialicee" target="_blank" class="social kofi">
                <img src="https://raw.githubusercontent.com/nako-hikari/support-files/main/assets/kofi-icon.png" alt="Ko-fi">
                Support me on Ko-fi
            </a>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/fflate@0.8.2/lib/browser.cjs"></script>
<script src="js/app.js"></script>
</body>
</html>
