<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MCPE Structure Extractor</title>
    <link rel="stylesheet" href="css/nako.css">

    <script type="importmap">
        {
            "imports": {
                "mcbe-leveldb-reader": "https://esm.sh/mcbe-leveldb-reader@2.0.1?exports=extractStructureFilesFromMcworld"
            }
        }
    </script>
</head>
<body>

<div class="wrapper">
    <div class="card">
        <h1>MCPE Structure Extractor</h1>
        <p>Drop a <code>.mcworld</code> or <code>.zip</code> file below.</p>

        <div style="margin: 20px 0;">
            <input type="file" id="upload" accept=".mcworld,.zip" style="display:none;">
            <button class="primary interactive"
                onclick="document.getElementById('upload').click()">
                Select World File
            </button>
        </div>

        <div id="status" class="output-box" style="display:none;"></div>
    </div>

    <div id="results" class="overflow-auto" style="margin-top: 20px;"></div>
</div>

<script src="js/app.js" type="module"></script>
</body>
</html>
